name: 'Build'
permissions: { }
on:
  push:
    branches: [ '!main' ]
  pull_request:
  workflow_dispatch:
jobs:
  build:
    name: 'Build'
    runs-on: 'ubuntu-24.04'
    timeout-minutes: 60
    permissions:
      contents: 'read'
    env:
      GRADLE_OPTS: '-Dorg.gradle.java.installations.auto-download=false'
    steps:
      - name: 'Checkout'
        timeout-minutes: 1
        uses: 'actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10' # v6.0.3
        with:
          persist-credentials: false
      - name: 'Setup JDK (17)'
        timeout-minutes: 1
        uses: 'actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654' # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '17.0.19+10'
      - name: 'Setup JDK (21)'
        timeout-minutes: 1
        uses: 'actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654' # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21.0.11+10'
      - name: 'Setup JDK (25)'
        timeout-minutes: 1
        uses: 'actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654' # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '25.0.3+9'
      - name: 'Setup Gradle'
        timeout-minutes: 10
        uses: 'gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60' # v6.1.1
        with:
          cache-read-only: true
          dependency-graph: 'generate'
      - name: 'Build'
        timeout-minutes: 60
        run: './gradlew assemble'
      - name: 'Upload'
        timeout-minutes: 10
        uses: 'actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a' # v7.0.1
        with:
          name: 'Artifacts'
          path: 'build/libs/'
